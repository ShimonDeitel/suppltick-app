name: Suppltick
options:
  bundleIdPrefix: com.shimondeitel.suppltick
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Suppltick:
    type: application
    platform: iOS
    sources:
      - path: Suppltick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suppltick
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Suppltick/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SuppltickTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SuppltickTests
      - path: Suppltick.storekit
    dependencies:
      - target: Suppltick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suppltick.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SuppltickUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SuppltickUITests
    dependencies:
      - target: Suppltick
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.suppltick.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Suppltick:
    build:
      targets:
        Suppltick: all
        SuppltickTests: [test]
        SuppltickUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Suppltick.storekit
    test:
      config: Debug
      storeKitConfiguration: Suppltick.storekit
      targets:
        - SuppltickTests
        - SuppltickUITests
    archive:
      config: Release
